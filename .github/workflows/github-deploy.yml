name: Build wheel and deploy to PyPI

on: [push, pull_request]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install requake and dependencies
      run: python -m pip install .

    - name: Run integration tests
      run: bash tests/run_all_tests.sh run

    - name: Clean integration test outputs
      if: always()
      run: bash tests/run_all_tests.sh clean

  dist:
    runs-on: ubuntu-latest
    needs:
    - integration-tests
    steps:
    - uses: actions/checkout@v6

    - name: Build wheel and SDist
      run: pipx run build

    - uses: actions/upload-artifact@v7
      with:
        path: dist/*

    - name: Check metadata
      run: pipx run twine check dist/*


  publish-to-pypi:
    name: >-
      Publish to PyPI
    # upload to PyPI on every tag starting with 'v'
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
    needs:
    - dist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/requake
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: artifact
          path: dist
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1